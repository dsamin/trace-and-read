name: TraceAndRead

options:
  bundleIdPrefix: com.devan.traceandread
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    # iPad-only.
    TARGETED_DEVICE_FAMILY: "2"
    # No signing needed to build/run in the simulator.
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"

targets:
  TraceAndRead:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Shared
      - path: Chassis
      - path: Features
      # Folder reference so the Audio/ subdirectory is preserved at runtime,
      # which is how SystemAudioEngine looks up bundled voice clips.
      - path: Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devan.traceandread.app
        # Explicit Info.plist (below) instead of the auto-generated one, which
        # was missing a valid CFBundleVersion and broke simctl install.
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # Calm full-screen, landscape-locked, iPad-only.
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  TraceAndReadTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: TraceAndRead
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.devan.traceandread.tests

schemes:
  TraceAndRead:
    build:
      targets:
        TraceAndRead: all
        TraceAndReadTests: [test]
    test:
      targets:
        - TraceAndReadTests
