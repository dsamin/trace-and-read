name: TraceAndRead

options:
  bundleIdPrefix: com.devan.traceandread
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    # iPad-only.
    TARGETED_DEVICE_FAMILY: "2"
    # Do NOT disable code signing: simulator apps must still be ad-hoc signed
    # (identity "-", no team required). With signing disabled the .app is
    # unsigned and `simctl install` rejects it with a MISLEADING
    # "does not contain a valid CFBundleVersion" error. Let the simulator SDK
    # apply its default ad-hoc signature.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  TraceAndRead:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Shared
      - path: Chassis
      - path: Features
      # Folder reference so the Audio/ subdirectory is preserved at runtime,
      # which is how SystemAudioEngine looks up bundled voice clips.
      - path: Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devan.traceandread.app
        # Use a committed, explicit Info.plist (Config/Info.plist) referenced
        # directly. XcodeGen's generated plist omitted CFBundleVersion, which
        # broke simctl install; this removes all reliance on plist synthesis.
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Config/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  TraceAndReadTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: TraceAndRead
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.devan.traceandread.tests

schemes:
  TraceAndRead:
    build:
      targets:
        TraceAndRead: all
        TraceAndReadTests: [test]
    test:
      targets:
        - TraceAndReadTests
